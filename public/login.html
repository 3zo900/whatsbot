<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول - WhatsBot.sa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal}</style>
</head>
<body class="bg-[#faf8ff] min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[420px]">
<div class="text-center mb-8">
<div class="w-16 h-16 bg-[#22c55e] rounded-2xl mx-auto flex items-center justify-center text-white font-black text-xl">WB</div>
<h1 class="font-black text-2xl mt-4">مرحباً بعودتك</h1>
</div>
<div class="bg-white border rounded-[2rem] p-8 shadow-sm">
<input id="email" type="email" placeholder="البريد" class="w-full border rounded-xl px-4 py-3.5 text-sm mb-3">
<input id="pass" type="password" placeholder="كلمة المرور" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<button onclick="login()" class="w-full bg-zinc-900 text-white rounded-full py-3.5 font-black text-sm mt-4">دخول</button>
<div id="msg" class="text-xs text-center mt-3"></div>
<div class="text-[10px] text-center text-zinc-400 mt-4">الأدمن: az.behlal@gmail.com / 0510015157qQ@</div>
</div>
</div>
<script>
function login(){
 const ADMIN_EMAIL='az.behlal@gmail.com'; const ADMIN_PASS='0510015157qQ@';
 const e=document.getElementById('email').value.trim(); const p=document.getElementById('pass').value;
 if(!e||!p){document.getElementById('msg').innerText='❌ ادخل البيانات'; return;}
 document.getElementById('msg').innerText='⏳...';
 setTimeout(()=>{
  if(e.toLowerCase()===ADMIN_EMAIL.toLowerCase() && p===ADMIN_PASS){
   localStorage.setItem('wb_admin','1'); localStorage.setItem('wb_user',e); location.href='admin.html';
  }else{
   localStorage.setItem('wb_user',e); location.href='dashboard.html';
  }
 },600);
}
</script>
</body>
</html>
