<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول - WhatsBot.sa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:'Tajawal',sans-serif}</style>
</head>
<body class="bg-[#faf8ff] min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[420px]">
<div class="text-center mb-8">
<!-- الشعار الجديد -->
<img src="logo.png" alt="WB" class="w-16 h-16 rounded-2xl mx-auto object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
<div class="w-16 h-16 bg-[#22c55e] rounded-2xl mx-auto hidden items-center justify-center text-white font-black text-xl">WB</div>
<h1 class="font-black text-2xl mt-4">مرحباً بعودتك</h1>
<p class="text-[13px] text-zinc-500 mt-1">سجل دخولك للوحة تحكم WhatsBot</p>
</div>

<div class="bg-white border border-zinc-200 rounded-[2rem] p-8 shadow-sm">
<div class="space-y-4">
<input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full border border-zinc-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-zinc-900">
<input id="pass" type="password" placeholder="كلمة المرور" class="w-full border border-zinc-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-zinc-900">

<button onclick="login()" class="w-full bg-zinc-900 text-white rounded-full py-3.5 font-black text-sm mt-2">تسجيل الدخول</button>

<div class="relative my-4"><div class="border-t"></div><span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-3 text-[11px] text-zinc-400">أو</span></div>

<button onclick="location.href='pay.html?plan=pro'" class="w-full bg-white border border-zinc-200 rounded-full py-3.5 font-bold text-sm">ليس لديك حساب؟ اشترك الآن</button>

<div id="msg" class="text-[12px] text-center mt-3"></div>
<!-- تم إزالة بيانات الأدمن من هنا ✅ -->
</div>
</div>

<div class="text-center mt-6">
<a href="index.html" class="text-[12px] text-zinc-500 hover:text-zinc-900">← العودة للرئيسية</a>
</div>

<!-- التعديل الجديد -->
<div class="text-center mt-6 text-[11px] text-zinc-500 font-bold tracking-wide">WhatsBot AI © 2026</div>
</div>

<script>
function login(){
 const e = document.getElementById('email').value;
 const p = document.getElementById('pass').value;
 const msg = document.getElementById('msg');
 if(!e ||!p){ msg.innerText='❌ ادخل البريد وكلمة المرور'; msg.className='text-[12px] text-center mt-3 text-red-500'; return; }
 msg.innerText='⏳ جاري تسجيل الدخول...';
 msg.className='text-[12px] text-center mt-3 text-zinc-500';
 setTimeout(()=>{
   localStorage.setItem('wb_current_email', e);
   localStorage.setItem('wb_user', e);
   location.href='dashboard.html';
 }, 800);
}
</script>
</body>
</html>
