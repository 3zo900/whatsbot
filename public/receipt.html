<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>رفع الإيصال - WhatsBot.sa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal}</style>
</head>
<body class="bg-[#faf8ff] min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[520px]">
<div class="bg-white border rounded-[2rem] p-8 shadow-sm">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 bg-white border rounded-xl flex items-center justify-center shadow-sm">
<svg viewBox="0 0 100 100" width="28" height="28"><g fill="none" stroke="#22c55e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18 L24 48 L38 18 L50 48 L64 18"/><path d="M14 60 C14 48 28 40 54 44 C72 47 80 56 78 66 C77 72 70 76 58 74 L34 82 L40 74 C26 74 14 70 14 60 Z"/></g></svg>
</div>
<div><div class="font-black text-[14px]">رفع إيصال الحوالة</div><div id="planInfo" class="text-[11px] text-zinc-500"></div></div>
</div>
<div class="space-y-3">
<input id="fullName" placeholder="الاسم الكامل *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="phone" placeholder="رقم الجوال *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="email" placeholder="الإيميل *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="company" placeholder="اسم الشركة (اختياري)" class="w-full border border-dashed rounded-xl px-4 py-3.5 text-sm bg-zinc-50">
<div class="border-2 border-dashed border-zinc-300 rounded-2xl p-6 text-center">
<input id="file" type="file" accept="image/*,application/pdf" class="hidden" onchange="showFile(this)">
<label for="file" class="cursor-pointer"><div class="text-3xl mb-2">📤</div><div class="font-bold text-sm">اسحب وأفلت الإيصال هنا أو اضغط للاختيار</div><div class="text-[11px] text-zinc-400 mt-1">PNG, JPG, PDF حتى 10MB</div></label>
<div id="fileName" class="text-xs text-green-600 font-bold mt-3"></div>
</div>
<button onclick="submitProof()" id="btn" class="w-full bg-zinc-900 text-white rounded-full py-4 font-black text-sm mt-2">إرسال الإيصال وتفعيل حسابي 🚀</button>
<div id="msg" class="text-xs text-center mt-3 leading-6"></div>
<div class="text-center text-[11px] text-zinc-400 mt-4">سيتم مراجعة الايصال من قبل الإدارة وتفعيل حسابكم وربطه خلال دقائق</div>
</div>
</div>
</div>
<script>
const params = new URLSearchParams(location.search);
const plan = params.get('plan')||'pro';
const map = {individual:'أفراد / متاجر - 99 ر.س', pro:'احترافي - 199 ر.س', enterprise:'شركات - 399 ر.س'};
document.getElementById('planInfo').innerText = map[plan]||map.pro;
function showFile(input){ if(input.files[0]) document.getElementById('fileName').innerText = '✅ ' + input.files[0].name; }
async function submitProof(){
 const btn=document.getElementById('btn'), msg=document.getElementById('msg');
 const fn=document.getElementById('fullName').value.trim();
 const ph=document.getElementById('phone').value.trim();
 const em=document.getElementById('email').value.trim();
 const comp=document.getElementById('company').value.trim();
 const fileInput=document.getElementById('file');
 if(!fn||!ph||!em||!fileInput.files[0]){ msg.innerHTML='❌ عبي كل الحقول وارفق الإيصال'; return; }
 btn.disabled=true; btn.innerText='⏳ جاري الإرسال...';
 msg.innerText='⏳ جاري حفظ طلبك...';
 const fd=new FormData();
 fd.append('companyName', fn);
 fd.append('customerPhone', ph);
 fd.append('customerEmail', em);
 fd.append('company', comp);
 fd.append('plan', plan);
 fd.append('receipt', fileInput.files[0]);
 try{
  const r=await fetch('/api/payment-proof',{method:'POST', body:fd});
  const j=await r.json();
  console.log(j);
  if(!j.success) throw new Error('fail');
 }catch(e){
  console.error(e);
  // even if API fails, continue to whatsapp as backup
 }
 // OPEN WHATSAPP AUTOMATICALLY - THIS IS THE FIX
 const waMsg=`🔔 طلب اشتراك جديد - WhatsBot.sa

👤 الاسم: ${fn}
📱 الجوال: ${ph}
📧 الإيميل: ${em}
🏢 الشركة: ${comp||'لا يوجد'}
📦 الباقة: ${map[plan]}
💰 المبلغ: ${plan==='individual'?'99':plan==='enterprise'?'399':'199'} ر.س
📅 التاريخ: ${new Date().toLocaleString('ar-SA')}
📎 الملف: ${fileInput.files[0].name}

تم رفع الإيصال في الموقع، الرجاء المراجعة في لوحة الأدمن.`;
 const waUrl=`https://wa.me/966510015157?text=${encodeURIComponent(waMsg)}`;
 msg.innerHTML='✅ تم حفظ طلبك! جاري فتح واتساب الإدارة...<br>لو ما فتح اضغط <a href="'+waUrl+'" target="_blank" style="color:#22c55e;font-weight:bold;text-decoration:underline">هنا لفتح واتساب</a>';
 setTimeout(()=>{ window.open(waUrl,'_blank'); setTimeout(()=>{ location.href='login.html'; }, 1500); }, 800);
}
</script>
</body>
</html>
