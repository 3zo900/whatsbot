<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>رفع الإيصال - WhatsBot.sa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal}</style>
</head>
<body class="bg-[#faf8ff] min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[520px]">
<div class="bg-white border rounded-[2rem] p-8 shadow-sm">
<div class="flex items-center gap-3 mb-6"><div class="w-10 h-10 bg-[#22c55e] rounded-xl flex items-center justify-center text-white font-black">WB</div><div><div class="font-black">رفع إيصال الحوالة</div><div id="planInfo" class="text-xs text-zinc-500"></div></div></div>
<div class="space-y-3">
<input id="fullName" placeholder="الاسم الكامل *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="phone" placeholder="رقم الجوال *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="email" placeholder="الإيميل *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="company" placeholder="اسم الشركة (اختياري)" class="w-full border border-dashed rounded-xl px-4 py-3.5 text-sm bg-zinc-50">
<div class="border-2 border-dashed border-zinc-300 rounded-2xl p-6 text-center">
<input id="file" type="file" accept="image/*,application/pdf" class="hidden" onchange="showFile(this)">
<label for="file" class="cursor-pointer"><div class="text-3xl mb-2">📤</div><div class="font-bold text-sm">اسحب وأفلت الإيصال هنا</div><div class="text-[11px] text-zinc-400 mt-1">PNG, JPG, PDF حتى 10MB</div></label>
<div id="fileName" class="text-xs text-green-600 font-bold mt-3"></div>
</div>
<button onclick="submit()" class="w-full bg-zinc-900 text-white rounded-full py-4 font-black text-sm mt-2">إرسال الإيصال وتفعيل حسابي 🚀</button>
<div id="msg" class="text-xs text-center mt-3"></div>
<div class="text-center text-[11px] text-zinc-400 mt-4">سيتم مراجعة الايصال من قبل الإدارة وتفعيل حسابكم وربطه خلال دقائق</div>
</div>
</div>
</div>
<script>
const params = new URLSearchParams(location.search);
const plan = params.get('plan')||'pro';
const map = {individual:'أفراد - 99 ر.س', pro:'احترافي - 199 ر.س', enterprise:'شركات - 399 ر.س'};
document.getElementById('planInfo').innerText = map[plan]||map.pro;
function showFile(input){ if(input.files[0]) document.getElementById('fileName').innerText = '✅ ' + input.files[0].name; }
async function submit(){
 const fn = document.getElementById('fullName').value;
 const ph = document.getElementById('phone').value;
 const em = document.getElementById('email').value;
 const comp = document.getElementById('company').value;
 const fileInput = document.getElementById('file');
 const msg = document.getElementById('msg');
 if(!fn||!ph||!em||!fileInput.files[0]){ msg.innerText='❌ عبي الحقول وارفق الإيصال'; return; }

 // حفظ محلي للوحة الأدمن
 try{
  let reqs = JSON.parse(localStorage.getItem('wb_requests')||'[]');
  reqs.push({id:Date.now().toString(), name:fn, companyName:fn, phone:ph, customerPhone:ph, email:em, customerEmail:em, company:comp, plan:plan, status:'pending', date:Date.now(), fileName:fileInput.files[0].name});
  localStorage.setItem('wb_requests', JSON.stringify(reqs));
 }catch(e){}

 msg.innerText='⏳ جاري الإرسال...';

 // إرسال واتساب مباشر لك
 const waMsg = `🔔 طلب اشتراك جديد - WhatsBot.sa\n\n👤 الاسم: ${fn}\n📱 الجوال: ${ph}\n📧 الإيميل: ${em}\n🏢 الشركة: ${comp||'لا يوجد'}\n📦 الباقة: ${map[plan]}\n📅 التاريخ: ${new Date().toLocaleString('ar-SA')}\n\n📎 الإيصال: ${fileInput.files[0].name}\n\nسيتم مراجعة الايصال من قبل الإدارة وتفعيل حسابكم وربطه خلال دقائق`;
 const waUrl = `https://wa.me/966510015157?text=${encodeURIComponent(waMsg)}`;

 // محاولة إرسال للسيرفر القديم أيضاً
 try{
  const fd = new FormData();
  fd.append('companyName', fn); fd.append('customerPhone', ph); fd.append('customerEmail', em);
  fd.append('company', comp); fd.append('plan', plan); fd.append('receipt', fileInput.files[0]);
  await fetch('/api/payment-proof', {method:'POST', body:fd});
 }catch(e){}

 msg.innerHTML='✅ تم! جاري فتح واتساب لإرسال التفاصيل للإدارة...';
 setTimeout(()=>{
  window.open(waUrl, '_blank');
  msg.innerHTML='✅ تم الاستلام! سيتم مراجعة الايصال من قبل الإدارة وتفعيل حسابكم وربطه خلال دقائق<br><br><a href="login.html" class="text-green-600 font-bold">الانتقال لتسجيل الدخول →</a>';
 }, 1000);
}
</script>
</body>
</html>
