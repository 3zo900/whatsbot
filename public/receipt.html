<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>رفع الإيصال - WhatsBot.sa - الرسمي 966511515727</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal}</style>
</head>
<body class="bg-[#faf8ff] min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[520px]">
<div class="bg-white border rounded-[2rem] p-8 shadow-sm">
<div class="text-center mb-6">
<div class="w-12 h-12 bg-zinc-900 rounded-full mx-auto flex items-center justify-center text-white font-black">W</div>
<h1 class="font-black text-xl mt-3">رفع إيصال الحوالة</h1>
<p class="text-xs text-zinc-500 mt-1">الرسمي: 966511515727 - سيصلك إشعار فوراً</p>
<p id="planInfo" class="text-xs text-zinc-400"></p>
</div>
<div class="space-y-3">
<input id="fullName" placeholder="الاسم الكامل *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="phone" placeholder="رقم الجوال *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="email" placeholder="الإيميل *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="company" placeholder="اسم الشركة (اختياري)" class="w-full border border-dashed rounded-xl px-4 py-3.5 text-sm bg-zinc-50">
<div class="border-2 border-dashed border-zinc-300 rounded-2xl p-6 text-center">
<input id="file" type="file" accept="image/*,application/pdf" class="hidden" onchange="showFile(this)">
<label for="file" class="cursor-pointer"><div class="text-3xl mb-2">📤</div><div class="font-bold text-sm">اسحب الإيصال هنا أو اضغط للاختيار</div><div class="text-[11px] text-zinc-400 mt-1">PNG, JPG, PDF</div></label>
<div id="fileName" class="text-xs text-green-600 font-bold mt-3"></div>
</div>
<button onclick="submitProof()" id="btn" class="w-full bg-zinc-900 text-white rounded-full py-4 font-black text-sm mt-2">إرسال الإيصال 🚀 - يوصلك على 966511515727</button>
<div id="msg" class="text-xs text-center mt-3 leading-6"></div>
</div>
</div>
</div>
<script>
const params = new URLSearchParams(location.search);
const plan = params.get('plan')||'pro';
const OFFICIAL_WA = '966511515727';
const map = {individual:'أفراد - 99 ر.س', pro:'احترافي - 199 ر.س', enterprise:'شركات - 399 ر.س'};
document.getElementById('planInfo').innerText = map;
function showFile(input){ if(input.files[0]) document.getElementById('fileName').innerText='✅ '+input.files[0].name; }
async function submitProof(){
 const btn=document.getElementById('btn'), msg=document.getElementById('msg');
 const fn=document.getElementById('fullName').value.trim();
 const ph=document.getElementById('phone').value.trim();
 const em=document.getElementById('email').value.trim();
 const comp=document.getElementById('company').value.trim();
 const fileInput=document.getElementById('file');
 if(!fn||!ph||!em||!fileInput.files[0]){ msg.innerHTML='❌ عبي البيانات وارفق الإيصال'; return; }
 btn.disabled=true; btn.innerText='⏳ جاري الإرسال...';
 const fd=new FormData();
 fd.append('companyName', fn); fd.append('customerPhone', ph); fd.append('customerEmail', em);
 fd.append('company', comp); fd.append('plan', plan); fd.append('receipt', fileInput.files[0]);
 try{ await fetch('/api/payment-proof',{method:'POST', body:fd}); }catch(e){}
 const waMsg=`🔔 طلب اشتراك جديد - WhatsBot.sa
الرقم الرسمي: ${OFFICIAL_WA}

👤 الاسم: ${fn}
📱 الجوال: ${ph}
📧 الإيميل: ${em}
🏢 الشركة: ${comp||'لا يوجد'}
📦 الباقة: ${map}
💰 المبلغ: ${plan==='individual'?'99':plan==='enterprise'?'399':'199'} ر.س
📅 التاريخ: ${new Date().toLocaleString('ar-SA')}
📎 الملف: ${fileInput.files[0].name}

راجع لوحة الأدمن admin.html`;
 const waUrl=`https://wa.me/${OFFICIAL_WA}?text=${encodeURIComponent(waMsg)}`;
 msg.innerHTML='✅ تم الحفظ! سيتم فتح واتساب الآن لإرسال الطلب إلى '+OFFICIAL_WA+'<br><br><a href="'+waUrl+'" target="_blank" style="background:#22c55e;color:black;padding:10px 20px;border-radius:9999px;font-weight:bold;display:inline-block">📤 اضغط هنا لو ما فتح الواتساب</a><div style="margin-top:10px;color:#888">سيتم تحويلك لصفحة الدخول بعد 3 ثواني</div>';
 window.open(waUrl,'_blank');
 setTimeout(()=>{ location.href='login.html?email='+encodeURIComponent(em); },3000);
}
</script>
</body>
</html>
