<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>رفع الإيصال - WhatsBot.sa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal}</style>
</head>
<body class="bg-[#faf8ff] min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[520px]">
<div class="bg-white border rounded-[2rem] p-8 shadow-sm">
<div class="text-center mb-6">
<div class="w-12 h-12 bg-zinc-900 rounded-full mx-auto flex items-center justify-center text-white font-black">W</div>
<h1 class="font-black text-xl mt-3">رفع إيصال الحوالة</h1>
<p id="planInfo" class="text-xs text-zinc-500 mt-1"></p>
<p class="text-[11px] text-zinc-400 mt-1">الدعم الرسمي: 966511515727</p>
</div>
<div class="space-y-3">
<input id="fullName" placeholder="الاسم الكامل *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="phone" placeholder="رقم الجوال *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="email" placeholder="الإيميل *" class="w-full border rounded-xl px-4 py-3.5 text-sm">
<input id="company" placeholder="اسم الشركة (اختياري)" class="w-full border border-dashed rounded-xl px-4 py-3.5 text-sm bg-zinc-50">
<div class="border-2 border-dashed border-zinc-300 rounded-2xl p-6 text-center">
<input id="file" type="file" accept="image/*,application/pdf" class="hidden" onchange="showFile(this)">
<label for="file" class="cursor-pointer"><div class="text-3xl mb-2">📤</div><div class="font-bold text-sm">اسحب الإيصال هنا أو اضغط للاختيار</div><div class="text-[11px] text-zinc-400 mt-1">PNG, JPG, PDF حتى 10MB</div></label>
<div id="fileName" class="text-xs text-green-600 font-bold mt-3"></div>
</div>
<button onclick="submitProof()" id="btn" class="w-full bg-zinc-900 text-white rounded-full py-4 font-black text-sm mt-2">إرسال الإيصال وتفعيل حسابي 🚀</button>
<div id="msg" class="text-xs text-center mt-3 leading-6"></div>
<div class="text-center text-[11px] text-zinc-400 mt-4">سيتم مراجعة الإيصال من الإدارة وتفعيل حسابك خلال دقائق<br>ستصلك رسالة واتساب فيها بيانات الدخول من الرقم الرسمي 966511515727</div>
</div>
</div>
</div>
<script>
const params = new URLSearchParams(location.search);
const plan = params.get('plan')||'pro';
const map = {individual:'أفراد / متاجر - 99 ر.س', pro:'احترافي - 199 ر.س', enterprise:'شركات - 399 ر.س'};
document.getElementById('planInfo').innerText = map[plan]||map.pro;
function showFile(input){ if(input.files[0]) document.getElementById('fileName').innerText='✅ '+input.files[0].name; }
async function submitProof(){
 const btn=document.getElementById('btn'), msg=document.getElementById('msg');
 const fn=document.getElementById('fullName').value.trim();
 const ph=document.getElementById('phone').value.trim();
 const em=document.getElementById('email').value.trim();
 const comp=document.getElementById('company').value.trim();
 const fileInput=document.getElementById('file');
 if(!fn||!ph||!em||!fileInput.files[0]){ msg.innerHTML='❌ عبي الاسم والجوال والإيميل وارفق الإيصال'; return; }
 btn.disabled=true; btn.innerText='⏳ جاري الإرسال...'; msg.innerText='⏳ جاري حفظ طلبك في النظام...';
 const fd=new FormData();
 fd.append('companyName', fn); fd.append('customerPhone', ph); fd.append('customerEmail', em);
 fd.append('company', comp); fd.append('plan', plan); fd.append('receipt', fileInput.files[0]);
 try{
  const r=await fetch('/api/payment-proof',{method:'POST', body:fd});
  const j=await r.json();
  if(j.success){
   // حفظ محلي احتياطي
   let reqs=JSON.parse(localStorage.getItem('wb_requests')||'[]');
   reqs.push({id:j.id||Date.now().toString(), name:fn, companyName:fn, phone:ph, customerPhone:ph, email:em, customerEmail:em, company:comp, plan:plan, status:'pending', date:Date.now()});
   localStorage.setItem('wb_requests', JSON.stringify(reqs));
   msg.innerHTML='✅ تم استلام إيصالك بنجاح! <br> سيتم مراجعته وتفعيل حسابك وإرسال بيانات الدخول على واتساب من الرقم الرسمي <b>966511515727</b><br><br>جاري تحويلك لصفحة الدخول...';
   setTimeout(()=> location.href='login.html?email='+encodeURIComponent(em)+'&pending=1', 2500);
  } else {
   msg.innerText='❌ حدث خطأ، حاول مرة أخرى';
   btn.disabled=false; btn.innerText='إرسال الإيصال وتفعيل حسابي 🚀';
  }
 }catch(e){
  msg.innerHTML='✅ تم الاستلام (وضع تجريبي) - سيتم تفعيل حسابك قريباً<br>جاري تحويلك...';
  setTimeout(()=> location.href='login.html', 2000);
 }
}
</script>
</body>
</html>
