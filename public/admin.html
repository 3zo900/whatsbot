<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة الأدمن - WhatsBot.sa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal}</style>
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen">
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[400px]">
<div class="text-center mb-8"><div class="w-20 h-20 bg-[#22c55e] rounded-[1.5rem] mx-auto flex items-center justify-center text-black font-black text-2xl">WB</div><h1 class="font-black text-2xl mt-5">لوحة الأدمن</h1><p class="text-xs text-white/50 mt-1">عبدالعزيز البهلال فقط 🔒</p></div>
<div class="bg-white/[0.06] border border-white/10 rounded-[2rem] p-8">
<input id="adminEmail" value="az.behlal@gmail.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 text-sm mb-3 text-white">
<input id="adminPass" value="0510015157qQ@" type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 text-sm mb-3 text-white">
<button onclick="adminLogin()" class="w-full bg-[#22c55e] text-black rounded-full py-3.5 font-black text-sm">دخول</button>
<div id="loginMsg" class="text-xs text-center mt-2"></div>
</div>
</div>
</div>
<div id="dashScreen" class="hidden">
<div class="p-6 max-w-6xl mx-auto">
<div class="flex justify-between items-center mb-6"><h1 class="text-xl font-black">طلبات الاشتراك - WhatsBot</h1><div class="flex gap-2"><span class="text-xs bg-[#22c55e] text-black px-3 py-1 rounded-full font-bold">Admin</span><button onclick="logout()" class="text-xs text-white/40">خروج</button></div></div>
<div class="grid grid-cols-3 gap-3 mb-6">
<div class="bg-white/5 border border-white/10 rounded-2xl p-4"><div class="text-[11px] text-white/40">طلبات معلقة</div><div id="statPending" class="text-xl font-black">0</div></div>
<div class="bg-white/5 border border-white/10 rounded-2xl p-4"><div class="text-[11px] text-white/40">مفعلين</div><div id="statApproved" class="text-xl font-black">0</div></div>
<div class="bg-white/5 border border-white/10 rounded-2xl p-4"><div class="text-[11px] text-white/40">الإيرادات</div><div id="statRevenue" class="text-xl font-black">0 ر.س</div></div>
</div>
<div class="flex gap-2 mb-4">
<button onclick="loadData()" class="bg-white text-black px-4 py-2 rounded-full text-xs font-bold">🔄 تحديث</button>
</div>
<div class="bg-white/[0.04] border border-white/10 rounded-[1.5rem] overflow-hidden">
<div class="p-4 border-b border-white/10 font-bold text-sm">الطلبات (من السيرفر)</div>
<div id="requestsList" class="divide-y divide-white/5"></div>
<div id="emptyRequests" class="p-10 text-center text-white/30 text-sm">لا يوجد طلبات حالياً</div>
</div>
<div class="mt-6 bg-white/[0.04] border border-white/10 rounded-[1.5rem] p-4">
<div class="font-bold text-sm mb-3">العملاء المفعلين</div>
<div id="usersList"></div>
</div>
</div>
</div>
<script>
const ADMIN_EMAIL='az.behlal@gmail.com'; const ADMIN_PASS='0510015157qQ@';
function adminLogin(){const e=document.getElementById('adminEmail').value.trim(); const p=document.getElementById('adminPass').value; if(e.toLowerCase()===ADMIN_EMAIL && p===ADMIN_PASS){localStorage.setItem('wb_admin','1'); showDashboard();} else {document.getElementById('loginMsg').innerText='❌ خطأ';}}
function showDashboard(){document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('dashScreen').classList.remove('hidden'); loadData();}
function logout(){localStorage.removeItem('wb_admin'); location.reload();}
if(localStorage.getItem('wb_admin')==='1') showDashboard();
async function loadData(){
 let serverRequests=[];
 try{
  const r = await fetch('/api/payment-proofs');
  const j = await r.json();
  if(j.success){ serverRequests = j.proofs || j.users || []; }
 }catch(e){}
 const pending = serverRequests.filter(r=>!r.status || r.status==='pending');
 const approved = serverRequests.filter(r=>r.status==='approved');
 document.getElementById('statPending').innerText = pending.length;
 document.getElementById('statApproved').innerText = approved.length;
 document.getElementById('statRevenue').innerText = approved.reduce((s,r)=>s+(r.amount||199),0)+' ر.س';
 const list = document.getElementById('requestsList');
 const empty = document.getElementById('emptyRequests');
 if(pending.length===0){ list.innerHTML=''; empty.classList.remove('hidden'); }
 else{
  empty.classList.add('hidden');
  list.innerHTML = pending.map(r=>`
   <div class="p-4 flex flex-col md:flex-row justify-between gap-3">
    <div>
     <div class="font-bold text-sm">${r.companyName||r.fullName} <span class="text-[10px] bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full ml-2">${r.plan} - ${r.plan==='individual'?'99':r.plan==='enterprise'?'399':'199'} ر.س</span></div>
     <div class="text-[11px] text-white/50 mt-1">${r.customerEmail||r.email} • ${r.customerPhone||r.phone}</div>
     <div class="text-[10px] text-white/30 mt-1">${new Date(r.createdAt||Date.now()).toLocaleString('ar-SA')}</div>
    </div>
    <div class="flex gap-2">
     <button onclick="approve('${r.id}')" class="bg-[#22c55e] text-black px-4 py-2 rounded-full text-xs font-black">✅ قبول</button>
     <button onclick="reject('${r.id}')" class="bg-white/10 px-3 py-2 rounded-full text-xs">❌ رفض</button>
     <a href="https://wa.me/${(r.customerPhone||r.phone||'').replace(/[^0-9]/g,'')}" target="_blank" class="bg-white/10 px-3 py-2 rounded-full text-xs">واتساب</a>
    </div>
   </div>
  `).join('');
 }
 document.getElementById('usersList').innerHTML = approved.map(u=>`<div class="flex justify-between bg-white/5 p-3 rounded-xl mb-2 text-sm"><span>${u.companyName||u.fullName} - ${u.customerEmail||u.email}</span><span class="text-[#22c55e] text-xs">مفعل ✅</span></div>`).join('') || 'لا يوجد';
}
async function approve(id){ await fetch('/api/admin/approve',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})}); alert('✅ تم التفعيل'); loadData(); }
async function reject(id){ if(!confirm('رفض؟')) return; await fetch('/api/admin/reject',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})}); loadData(); }
</script>
</body>
</html>
