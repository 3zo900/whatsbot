<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>دخول الادمن - WhatsBot</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'IBM Plex Sans Arabic',sans-serif}
body{background:#fdfcf8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border:1px solid #f0ebe0;border-radius:24px;padding:32px;width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.06)}
.logo{width:56px;height:56px;background:#25D366;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
h1{text-align:center;font-size:18px;font-weight:800;margin-bottom:4px}
.sub{text-align:center;font-size:12px;color:#999;margin-bottom:24px}
.input{width:100%;background:#faf6ef;border:1.5px solid #f0ebe0;border-radius:14px;padding:14px 16px;font-size:14px;outline:none;margin-bottom:14px;transition:.2s}
.input:focus{border-color:#25D366;background:#fff}
.btn{width:100%;background:#111;color:#fff;border:none;border-radius:30px;padding:14px;font-weight:800;font-size:14px;cursor:pointer}
.btn:active{transform:scale(.98)}
.alert{padding:10px 14px;border-radius:12px;font-size:12px;margin-bottom:12px;display:none}
.alert-err{background:#ffe0e0;color:#a00;display:block}
.alert-ok{background:#e8f5e9;color:#1b5e20;display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M7 11C7 7.5 9.5 5 13 5H16C19.5 5 22 7.5 22 11C22 14.5 19.5 17 16 17H11L8.5 19.5V17C5.5 17 3.5 14.5 3.5 11" stroke="white" stroke-width="1.8" stroke-linecap="round"/><path d="M17.5 2.5L18.7 5L21.2 6.2L18.7 7.4L17.5 9.9L16.3 7.4L13.8 6.2L16.3 5L17.5 2.5Z" fill="#FFEB3B" stroke="white" stroke-width="1"/></svg></div>
  <h1>🔐 دخول الادمن</h1>
  <div class="sub">لوحة التحكم الخاصة - WhatsBot AI</div>
  <div id="alert" class="alert" style="display:none"></div>
  <input id="email" class="input" placeholder="اسم المستخدم / الايميل" value="az.behlal@gmail.com" dir="ltr">
  <input id="pass" class="input" type="password" placeholder="كلمة المرور" dir="ltr">
  <button class="btn" onclick="login()">دخول</button>
</div>
<script>
const USERS = [
  {email:'az.behlal@gmail.com', pass:'0510015157qQ@', role:'superadmin'},
  {email:'admin', pass:'Letsbot@2026', role:'admin'}
];
function login(){
  const e=document.getElementById('email').value.trim();
  const p=document.getElementById('pass').value;
  const a=document.getElementById('alert');
  const found = USERS.find(u=>u.email===e && u.pass===p);
  if(found){
    localStorage.setItem('wb_admin', JSON.stringify(found));
    a.className='alert alert-ok'; a.style.display='block'; a.innerText='✅ تم الدخول - جاري التحويل...';
    setTimeout(()=> location.href='/admin-dashboard.html', 800);
  }else{
    a.className='alert alert-err'; a.style.display='block'; a.innerText='❌ بيانات الدخول غير صحيحة';
  }
}
</script>
</body>
</html>
