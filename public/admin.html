<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة الأدمن - WhatsBot.sa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal}</style>
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen p-6">
<div id="loginScreen" class="min-h-[80vh] flex items-center justify-center">
<div class="w-full max-w-[400px] text-center">
<div class="w-16 h-16 bg-[#22c55e] rounded-2xl mx-auto flex items-center justify-center font-black text-black text-xl">WB</div>
<h1 class="font-black text-xl mt-4">دخول الأدمن</h1>
<input id="adminEmail" value="az.behlal@gmail.com" class="w-full mt-6 bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-sm">
<input id="adminPass" type="password" value="0510015157qQ@" class="w-full mt-3 bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-sm">
<button onclick="login()" class="w-full mt-4 bg-[#22c55e] text-black rounded-full py-3 font-black text-sm">دخول</button>
<div id="loginMsg" class="text-xs mt-3 text-red-400"></div>
</div>
</div>

<div id="dashScreen" class="hidden max-w-[1000px] mx-auto">
<div class="flex justify-between items-center mb-6">
<h1 class="text-2xl font-black">طلبات الاشتراك الجديدة</h1>
<span class="text-xs bg-[#22c55e] text-black px-3 py-1 rounded-full font-bold">Admin</span>
</div>

<div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
<div class="bg-white/5 border border-white/10 rounded-2xl p-5"><div class="text-[11px] text-white/40">طلبات معلقة</div><div id="statPending" class="text-2xl font-black mt-1">0</div></div>
<div class="bg-white/5 border border-white/10 rounded-2xl p-5"><div class="text-[11px] text-white/40">عملاء مفعلين</div><div id="statApproved" class="text-2xl font-black mt-1">0</div></div>
<div class="bg-[#22c55e]/10 border border-[#22c55e]/20 rounded-2xl p-5"><div class="text-[11px] text-[#22c55e]">الإيرادات</div><div id="statRevenue" class="text-xl font-black mt-1">0 ر.س</div></div>
</div>

<div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden">
<div class="p-4 border-b border-white/10 flex justify-between"><span class="font-bold text-sm">الطلبات</span><button onclick="loadData()" class="text-xs text-white/50">🔄 تحديث</button></div>
<div id="requestsList" class="divide-y divide-white/5"></div>
<div id="emptyMsg" class="p-12 text-center text-white/30 text-sm">لا يوجد طلبات حالياً - عندما يرفع عميل إيصال سيظهر هنا مباشرة (من السيرفر)</div>
</div>

<div class="mt-8 bg-white/5 border border-white/10 rounded-2xl p-5">
<h3 class="font-bold text-sm mb-3">العملاء المفعلين</h3>
<div id="usersList" class="space-y-2 text-sm"></div>
</div>
</div>

<script>
const ADMIN_EMAIL='az.behlal@gmail.com';
const ADMIN_PASS='0510015157qQ@';
function login(){
 const e=document.getElementById('adminEmail').value.trim();
 const p=document.getElementById('adminPass').value;
 if(e===ADMIN_EMAIL && p===ADMIN_PASS){ localStorage.setItem('wb_admin','1'); showDash(); } else { document.getElementById('loginMsg').innerText='خطأ في البيانات'; }
}
function showDash(){ document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('dashScreen').classList.remove('hidden'); loadData(); }
if(localStorage.getItem('wb_admin')==='1') showDash();

async function loadData(){
 try{
  const r=await fetch('/api/payment-proofs');
  const data=await r.json();
  let proofs = data.proofs || data.users || data || [];
  if(!Array.isArray(proofs)) proofs = [];
  console.log('proofs from server:', proofs);
  renderProofs(proofs);
 }catch(e){
  console.error(e);
  document.getElementById('emptyMsg').innerText='❌ فشل الاتصال بالسيرفر - تأكد من server.js';
  document.getElementById('emptyMsg').classList.remove('hidden');
 }
}
function renderProofs(all){
 const pending = all.filter(x=>x.status==='pending' || !x.status);
 const approved = all.filter(x=>x.status==='approved');
 document.getElementById('statPending').innerText = pending.length;
 document.getElementById('statApproved').innerText = approved.length;
 document.getElementById('statRevenue').innerText = (approved.reduce((s,x)=>s+(x.amount|| (x.plan==='individual'?99:x.plan==='enterprise'?399:199)),0)) + ' ر.س';
 const list=document.getElementById('requestsList');
 const empty=document.getElementById('emptyMsg');
 if(pending.length===0){ list.innerHTML=''; empty.classList.remove('hidden'); } else {
  empty.classList.add('hidden');
  list.innerHTML=pending.map(r=>`
   <div class="p-4 flex flex-col md:flex-row justify-between gap-3">
    <div><div class="font-bold text-sm">${r.fullName||r.companyName||r.name||'عميل'} <span class="text-[10px] bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full ml-2">${r.plan||'pro'}</span></div>
    <div class="text-[11px] text-white/50 mt-1">${r.email||r.customerEmail||''} • ${r.phone||r.customerPhone||''} • ${new Date(r.createdAt||r.date||Date.now()).toLocaleString('ar-SA')}</div>
    ${r.file?'<div class="text-[11px] text-[#22c55e]">📎 '+r.file+'</div>':''}
    </div>
    <div class="flex gap-2 self-start">
     <button onclick="approveReq('${r.id}')" class="bg-[#22c55e] text-black px-4 py-2 rounded-full text-xs font-black">✅ قبول</button>
     <button onclick="rejectReq('${r.id}')" class="bg-white/10 px-4 py-2 rounded-full text-xs">❌ رفض</button>
     <a href="https://wa.me/${(r.phone||r.customerPhone||'').replace(/[^0-9]/g,'')}" target="_blank" class="bg-white/10 px-3 py-2 rounded-full text-xs">واتساب</a>
    </div>
   </div>
  `).join('');
 }
 document.getElementById('usersList').innerHTML = approved.map(u=>`
  <div class="bg-white/5 p-3 rounded-xl flex justify-between"><span>${u.fullName||u.companyName} - ${u.email||u.customerEmail}</span><span class="text-[#22c55e] text-xs">مفعل ✅</span></div>
 `).join('') || '<div class="text-white/30 text-center py-4">لا يوجد عملاء بعد</div>';
}
async function approveReq(id){
 try{ await fetch('/api/admin/approve',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})}); }catch(e){}
 alert('✅ تم التفعيل'); loadData();
}
async function rejectReq(id){
 if(!confirm('رفض الطلب؟')) return;
 try{ await fetch('/api/admin/reject',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})}); }catch(e){}
 loadData();
}
</script>
</body>
</html>
