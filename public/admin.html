<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة الأدمن - مع عرض الإيصال - 966511515727</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:'Tajawal',sans-serif}</style>
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen">
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[400px]">
<div class="text-center mb-8">
<div class="w-20 h-20 bg-[#22c55e] rounded-[1.5rem] mx-auto flex items-center justify-center text-white font-black text-2xl">WB</div>
<h1 class="font-black text-2xl mt-5">لوحة الأدمن - عرض الإيصالات</h1>
<p class="text- text-white/50 mt-1">الرسمي: 966511515727</p>
</div>
<div class="bg-white/[0.06] border border-white/10 rounded- p-8">
<div class="space-y-4">
<input id="adminEmail" type="email" value="az.behlal@gmail.com" class="w-full bg-white/[0.06] border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white outline-none">
<input id="adminPass" type="password" value="0510015157qQ@" class="w-full bg-white/[0.06] border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white outline-none">
<button onclick="adminLogin()" class="w-full bg-[#22c55e] text-black rounded-full py-3.5 font-black text-sm">دخول →</button>
</div>
</div>
</div>
</div>

<div id="dashScreen" class="hidden">
<div class="flex min-h-screen">
<div class="w-[260px] bg-white/[0.03] border-l border-white/10 p-6 hidden md:block">
<div class="flex items-center gap-3 mb-8"><div class="w-10 h-10 bg-[#22c55e] rounded-xl flex items-center justify-center font-black text-black">WB</div><div><div class="font-black text-sm">WhatsBot Admin</div><div class="text- text-white/40">966511515727</div></div></div>
<div class="space-y-2">
<button class="w-full text-right bg-white text-black rounded-xl px-4 py-3 text-sm font-bold">📥 الطلبات مع الإيصالات</button>
</div>
</div>
<div class="flex-1 p-6">
<h1 class="text-2xl font-black mb-6">طلبات الاشتراك - مع عرض الإيصال 🧾</h1>
<div id="requestsList" class="space-y-4"></div>
<div id="emptyRequests" class="p-12 text-center text-white/30 text-sm hidden">لا يوجد طلبات</div>
</div>
</div>
</div>

<div id="receiptModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
<div class="bg-white rounded-2xl max-w-[90vw] max-h-[90vh] overflow-auto p-4">
<div class="flex justify-between items-center mb-4"><h3 class="font-black text-black">الإيصال</h3><button onclick="closeReceipt()" class="bg-zinc-900 text-white px-4 py-1.5 rounded-full text-xs">إغلاق ✕</button></div>
<img id="receiptImg" src="" class="max-w-full max-h-[80vh] rounded-xl hidden">
<iframe id="receiptPdf" src="" class="w-[80vw] h-[80vh] hidden"></iframe>
<div id="receiptLink" class="text-center"></div>
</div>
</div>

<script>
const ADMIN_EMAIL='az.behlal@gmail.com'; const ADMIN_PASS='0510015157qQ@';
function adminLogin(){ const e=document.getElementById('adminEmail').value.trim(); const p=document.getElementById('adminPass').value; if(e===ADMIN_EMAIL && p===ADMIN_PASS){ localStorage.setItem('wb_admin','1'); showDashboard(); } }
function showDashboard(){ document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('dashScreen').classList.remove('hidden'); loadData(); setInterval(loadData, 10000); }
if(localStorage.getItem('wb_admin')==='1'){ showDashboard(); }

let requests=JSON.parse(localStorage.getItem('wb_requests')||'[]');
function generatePass(len=10){ const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'; let p=''; for(let i=0;i<len;i++) p+=c[Math.floor(Math.random()*c.length)]; return p; }

async function loadData(){
 try{ const r=await fetch('/api/payment-proofs'); const d=await r.json(); if(Array.isArray(d) && d.length>0){ requests=d; localStorage.setItem('wb_requests', JSON.stringify(requests)); } }catch(e){}
 const pending=requests.filter(r=>r.status==='pending' ||!r.status);
 const list=document.getElementById('requestsList'); const empty=document.getElementById('emptyRequests');
 if(pending.length===0){ list.innerHTML=''; empty.classList.remove('hidden'); return; }
 empty.classList.add('hidden');
 list.innerHTML=pending.map((r,i)=>`
  <div class="bg-white/[0.05] border border-white/10 rounded-2xl p-5">
   <div class="flex flex-col md:flex-row gap-4">
    <div class="flex-1">
     <div class="flex items-center gap-2"><span class="font-bold">${r.fullName||r.companyName||'عميل'}</span><span class="text- bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full">${r.plan||'pro'} - ${r.plan==='individual'?'99':r.plan==='enterprise'?'399':'199'} ر.س</span></div>
     <div class="text- text-white/50 mt-2">📧 ${r.email||r.customerEmail||''}</div>
     <div class="text- text-white/50">📱 ${r.phone||r.customerPhone||''} - 🏢 ${r.company||'لا يوجد'}</div>
     <div class="text- text-white/30 mt-1">📅 ${new Date(r.createdAt||r.date||Date.now()).toLocaleString('ar-SA')}</div>
     <div class="text- text-white/30">📎 ${r.file||'لا يوجد ملف'} ${r.fileUrl?'<a href="'+r.fileUrl+'" target="_blank" class="text-[#22c55e] underline">فتح مباشر</a>':''}</div>
    </div>
    <div class="w-full md:w-[200px] bg-black/30 rounded-xl p-2">
     ${r.fileUrl? (r.fileUrl.toLowerCase().endsWith('.pdf')? `<a href="${r.fileUrl}" target="_blank" class="block text-center py-8 bg-white/5 rounded-xl text-sm">📄 عرض PDF<br><span class="text- text-[#22c55e]">اضغط للفتح</span></a>` : `<img src="${r.fileUrl}" class="w-full h-[120px] object-cover rounded-xl cursor-pointer" onclick="openReceipt('${r.fileUrl}')">`) : '<div class="py-8 text-center text-white/20 text-xs">لا يوجد إيصال</div>'}
     ${r.fileUrl? `<button onclick="openReceipt('${r.fileUrl}')" class="w-full mt-2 bg-white text-black rounded-full py-2 text-xs font-bold">👁️ تكبير الإيصال</button>` : ''}
    </div>
   <div class="flex gap-2 mt-4">
    <button onclick="approve('${r.id}')" class="flex-1 bg-[#22c55e] text-black px-4 py-2.5 rounded-full text-xs font-black">✅ قبول + توليد باسورد 10 خانات</button>
    <button onclick="reject('${r.id}')" class="bg-white/10 text-white px-4 py-2.5 rounded-full text-xs">❌ رفض</button>
   </div>
  </div>
 `).join('');
}

function openReceipt(url){
 document.getElementById('receiptModal').classList.remove('hidden');
 if(url.toLowerCase().endsWith('.pdf')){
  document.getElementById('receiptImg').classList.add('hidden');
  document.getElementById('receiptPdf').classList.remove('hidden');
  document.getElementById('receiptPdf').src=url;
  document.getElementById('receiptLink').innerHTML=`<a href="${url}" target="_blank" class="text-blue-600 underline text-sm mt-2 inline-block">فتح في تبويب جديد</a>`;
 } else {
  document.getElementById('receiptPdf').classList.add('hidden');
  document.getElementById('receiptImg').classList.remove('hidden');
  document.getElementById('receiptImg').src=url;
  document.getElementById('receiptLink').innerHTML=`<a href="${url}" target="_blank" class="text-blue-600 underline text-sm mt-2 inline-block">فتح الصورة بحجم كامل</a>`;
 }
}
function closeReceipt(){ document.getElementById('receiptModal').classList.add('hidden'); }

async function approve(id){
 const r=requests.find(x=>x.id===id); if(!r) return;
 const pass=generatePass(10);
 r.password=pass; r.status='approved';
 localStorage.setItem('wb_requests', JSON.stringify(requests));
 try{ await fetch('/api/admin/approve',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})}); }catch(e){}
 const email=r.email||r.customerEmail; const phone=(r.phone||r.customerPhone||'').replace(/[^0-9]/g,'');
 const waMsg=`✅ تم تفعيل حسابك في WhatsBot.sa!
📧 الإيميل: ${email}
🔑 الرقم السري: ${pass}
🌐 https://whatsbot.sa/client-dashboard.html
📞 الدعم الرسمي: 966511515727`;
 alert(`✅ تم التفعيل!\nالإيميل: ${email}\nالباسورد: ${pass}`);
 window.open(`https://wa.me/${phone}?text=${encodeURIComponent(waMsg)}`,'_blank');
 loadData();
}
async function reject(id){ if(!confirm('رفض الطلب؟')) return; const r=requests.find(x=>x.id===id); if(r) r.status='rejected'; localStorage.setItem('wb_requests', JSON.stringify(requests)); try{ await fetch('/api/admin/reject',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})}); }catch(e){} loadData(); }
</script>
</body>
</html>
