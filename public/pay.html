<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>الدفع - WhatsBot.sa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal}</style>
</head>
<body class="bg-[#faf8ff] min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[560px]">
<div class="text-center mb-6">
<div class="w-14 h-14 bg-[#22c55e] rounded-2xl mx-auto flex items-center justify-center text-white font-black">WB</div>
<h1 class="font-black text-2xl mt-3">إتمام الاشتراك</h1>
</div>

<div class="bg-white border rounded-[2rem] p-8 shadow-sm">
<div class="flex justify-between items-center mb-6">
<div><div id="planName" class="font-black text-lg"></div><div id="planPrice" class="text-sm text-zinc-500"></div></div>
<div class="bg-[#f0fdf4] text-green-700 px-3 py-1 rounded-full text-[11px] font-bold">تحويل بنكي مباشر</div>
</div>

<div class="bg-[#0a1f13] rounded-[1.5rem] p-6 text-white">
<h3 class="font-black mb-4">🏦 بيانات التحويل - مصرف الراجحي</h3>
<div class="space-y-3 text-sm font-mono">
<div class="bg-white/10 rounded-xl p-4 flex justify-between items-center"><span class="text-white/50 text-xs">الآيبان</span><div class="flex items-center gap-2"><span class="text-[12px]">SA95 8000 0498 6080 1001 6706</span></div></div>
<div class="bg-white/10 rounded-xl p-4 flex justify-between"><span class="text-white/50 text-xs">رقم الحساب</span><span>498608010016706</span></div>
<div class="bg-white/10 rounded-xl p-4 flex justify-between"><span class="text-white/50 text-xs">المستفيد</span><span class="font-sans font-black">عبدالعزيز البهلال</span></div>
<div class="bg-white/10 rounded-xl p-4 flex justify-between"><span class="text-white/50 text-xs">البنك</span><span>مصرف الراجحي</span></div>
</div>
<div class="mt-4 bg-[#22c55e] rounded-xl p-3 text-center text-xs font-bold">حول المبلغ ثم اضغط تم الدفع لرفع الإيصال</div>
</div>

<div class="mt-6 grid grid-cols-2 gap-3">
<a href="index.html" class="bg-zinc-100 text-zinc-700 rounded-full py-3 text-center text-sm font-bold">رجوع</a>
<button onclick="goReceipt()" class="bg-zinc-900 text-white rounded-full py-3 text-sm font-black">تم الدفع - رفع الإيصال →</button>
</div>
</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const plan = params.get('plan')||'pro';
const plans = {
 individual: {name:'أفراد / متاجر', price:'99 ر.س / شهر'},
 pro: {name:'احترافي - الأكثر طلباً', price:'199 ر.س / شهر'},
 enterprise: {name:'شركات', price:'399 ر.س / شهر'}
};
document.getElementById('planName').innerText = plans[plan]?.name || plans.pro.name;
document.getElementById('planPrice').innerText = plans[plan]?.price || plans.pro.price;
function goReceipt(){ location.href='receipt.html?plan='+plan; }
</script>
</body>
</html>
