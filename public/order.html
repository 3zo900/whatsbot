<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WhatsBot.sa - طلب اشتراك</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
body{font-family:Tajawal}
.type-btn.active{background:#111827!important;color:#fff!important;border-color:#111827!important;transform:scale(1.02)}
.success-modal{backdrop-filter:blur(10px)}
</style>
</head>
<body class="bg-white">

<!-- HEADER -->
<div class="bg-[#0f2e26] text-white text-center py-7 px-6">
<div class="inline-flex bg-white/10 text-xs px-3 py-1 rounded-full mb-3">189 ر.س / شهر - احترافي الأكثر طلباً</div>
<h1 class="text-[22px] font-black">جاهز تخلي عملاءك يلاقوا رد فوري؟</h1>
</div>

<div class="max-w-[600px] mx-auto p-6 pb-20">

<label class="font-bold text-sm">اسمك الكريم</label>
<input id="c_name" placeholder="مثال: منى محمد" class="w-full bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl px-5 py-4 mt-2 text-sm focus:border-zinc-900 outline-none">

<label class="font-bold text-sm mt-6 block">رقم الواتساب اللي بنتواصل معك عليه</label>
<div class="flex gap-3 mt-2">
<div class="bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl px-4 py-4 text-sm flex items-center gap-1">🇸🇦 السعودية +966</div>
<input id="c_phone" value="510015157" placeholder="5XXXXXXXX" class="flex-1 bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl px-5 py-4 text-sm outline-none">
</div>

<label class="font-bold text-sm mt-6 block">وش نوع نشاطك؟</label>
<div class="grid grid-cols-2 gap-3 mt-3">
<button data-type="محل / متجر" class="type-btn bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold transition">محل / متجر</button>
<button data-type="عيادة / مركز طبي" class="type-btn bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold transition">عيادة / مركز طبي</button>
<button data-type="مكتب عقاري" class="type-btn bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold transition">مكتب عقاري</button>
<button data-type="مطعم / كافيه" class="type-btn bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold transition">مطعم / كافيه</button>
<button data-type="خدمات أخرى" class="type-btn col-span-2 bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold transition">خدمات أخرى</button>
</div>

<label class="font-bold text-sm mt-6 block">وش أكثر شي متعبك في الرد على العملاء؟ (اختياري)</label>
<textarea id="c_challenge" placeholder="مثال: ما ألحق أرد على كل العملاء وتروح علي مبيعات كثيرة..." class="w-full bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl px-5 py-4 mt-2 text-sm h-[90px] resize-none outline-none"></textarea>

<button id="submitBtn" onclick="submitOrder()" class="w-full bg-zinc-900 hover:bg-black text-white rounded-full py-4 font-black text-sm mt-8">✅ إرسال الطلب - بنكلمك واتساب</button>

<div id="err" class="text-center text-xs mt-3 text-red-500 hidden"></div>
<div class="text-center text-[11px] text-zinc-400 mt-8">© WhatsBot.sa 2026 - بإدارة ناصر محمد</div>
</div>

<!-- رسالة النجاح -->
<div id="successModal" class="fixed inset-0 bg-black/60 success-modal hidden items-center justify-center p-6 z-[100]">
<div class="bg-white rounded-[2rem] p-8 w-full max-w-[380px] text-center shadow-2xl animate-[bounce_0.5s]">
<div class="w-16 h-16 bg-[#22c55e] rounded-full mx-auto flex items-center justify-center text-white text-2xl">✓</div>
<h2 class="font-black text-xl mt-4">تم إرسال طلبك ✅</h2>
<p class="text-sm text-zinc-600 mt-3 leading-6">سيتم التواصل معك على الواتساب المسجل من قبل فريق خدمة العملاء في أقرب وقت ممكن</p>
<div class="mt-2 text-xs text-zinc-400">رقمك: <span id="sentPhone" class="font-bold"></span></div>
<button onclick="closeSuccess()" class="w-full bg-zinc-900 text-white rounded-full py-3 mt-6 text-sm font-bold">تمام 👍</button>
</div>
</div>

<script>
let selectedType = '';
document.querySelectorAll('.type-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.type;
  });
});

function closeSuccess(){
  document.getElementById('successModal').classList.add('hidden');
  document.getElementById('successModal').classList.remove('flex');
}

async function submitOrder(){
  const name = document.getElementById('c_name').value.trim();
  const phone = document.getElementById('c_phone').value.trim();
  const challenge = document.getElementById('c_challenge').value.trim();
  const err = document.getElementById('err');
  const btn = document.getElementById('submitBtn');

  err.classList.add('hidden');
  if(!name){ err.innerText='❌ اكتب اسمك الكريم'; err.classList.remove('hidden'); return; }
  if(!phone || phone.length < 8){ err.innerText='❌ اكتب رقم واتساب صحيح'; err.classList.remove('hidden'); return; }
  if(!selectedType){ err.innerText='❌ اختر نوع نشاطك'; err.classList.remove('hidden'); return; }

  btn.innerText='⏳ جاري الإرسال...'; btn.disabled=true;

  try{
    const res = await fetch('/api/orders',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, phone:'966'+phone, type:selectedType, challenge, plan:'pro' })
    });
    const data = await res.json();
    if(data.success){
      // إظهار رسالة النجاح المطلوبة
      document.getElementById('sentPhone').innerText = '966'+phone;
      document.getElementById('successModal').classList.remove('hidden');
      document.getElementById('successModal').classList.add('flex');
      btn.innerText='✅ تم الإرسال';
      // تصفير الحقول
      document.getElementById('c_name').value='';
      document.getElementById('c_phone').value='';
      document.getElementById('c_challenge').value='';
      document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
      selectedType='';
    }else{
      err.innerText='❌ حدث خطأ حاول مرة ثانية'; err.classList.remove('hidden');
      btn.innerText='إرسال الطلب - بنكلمك واتساب'; btn.disabled=false;
    }
  }catch(e){
    err.innerText='❌ مشكلة في الاتصال'; err.classList.remove('hidden');
    btn.innerText='إرسال الطلب'; btn.disabled=false;
  }
}
</script>

</body>
</html>
