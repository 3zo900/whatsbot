<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>إتمام الاشتراك - WhatsBot</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal;background:#0f2620}</style>
</head>
<body class="min-h-screen">

<div class="bg-[#0f2620] text-center pt-10 pb-8 px-6">
<h1 class="text-2xl md:text-3xl font-black leading-tight"><span class="text-[#ff8c32]">رد</span> <span class="text-white">جاهز تخلي عملاءك يلاقوا</span><br><span class="text-[#ff8c32]">فوري؟</span></h1>
<p class="text-white/50 text-sm mt-4 leading-6 max-w-md mx-auto">عبّ بياناتك تحت وبنكلمك خلال ساعتين على الواتساب<br>عشان نفعل لك الحساب، الاستشارة مجانية</p>
</div>

<div class="bg-white rounded-t-[2.5rem] p-6 md:p-8 max-w-[600px] mx-auto -mt-2 min-h-screen">

<div class="flex justify-between items-center mb-8">
<div class="font-black">احترافي - الأكثر طلباً</div>
<div class="bg-[#e8f5e9] text-[#166534] text-xs px-4 py-2 rounded-full font-bold">189 ر.س / شهر</div>
</div>

<label class="font-bold text-sm">اسمك الكريم</label>
<input placeholder="مثال: ناصر محمد" class="w-full bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl px-5 py-4 mt-2 text-sm focus:outline-none focus:border-zinc-900 placeholder:text-zinc-400">

<label class="font-bold text-sm mt-6 block">رقم الواتساب اللي بنتواصل معك عليه</label>
<div class="flex gap-3 mt-2">
<div class="bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl px-4 py-4 text-sm flex items-center gap-2">🇸🇦 السعودية +966</div>
<input placeholder="5XXXXXXX" class="flex-1 bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl px-5 py-4 text-sm focus:outline-none">
</div>

<label class="font-bold text-sm mt-6 block">وش نوع نشاطك؟</label>
<div class="grid grid-cols-2 gap-3 mt-3">
<button class="bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold">محل / متجر</button>
<button class="bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold">عيادة / مركز طبي</button>
<button class="bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold">مكتب عقاري</button>
<button class="bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold">مطعم / كافيه</button>
<button class="col-span-2 bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl py-4 text-sm font-bold">خدمات أخرى</button>
</div>

<label class="font-bold text-sm mt-6 block">وش أكثر شي متعبك في الرد على العملاء؟ (اختياري)</label>
<textarea placeholder="مثال: ما ألحق أرد على كل العملاء وتروح علي مبيعات كثيرة..." class="w-full bg-[#fdf6e9] border border-[#f0e6d3] rounded-2xl px-5 py-4 mt-2 text-sm h-24 resize-none focus:outline-none"></textarea>

<button class="w-full bg-zinc-900 text-white rounded-full py-4 font-black text-sm mt-8">إرسال الطلب - بنكلمك واتساب ✅</button>

<div class="text-center text-xs text-zinc-400 mt-6">© 2026 WhatsBot.sa</div>
</div>

</body>
</html>
