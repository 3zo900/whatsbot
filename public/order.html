<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>طلب اشتراك - WhatsBot AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:Tajawal;background:#0a2e1e}</style>
</head>
<body class="min-h-screen p-6">
<div class="max-w-[520px] mx-auto">
<div class="text-center text-white py-8">
<div class="text-orange-400 font-bold text-sm">— ابدأ معنا —</div>
<h1 class="text-3xl font-black mt-3 leading-tight">جاهز تخلي عملاءك يلاقوا <span class="text-orange-400">رد فوري؟</span></h1>
<p class="text-white/60 text-sm mt-3">سيب لنا بياناتك وهنكلمك خلال ساعتين عشان نحجزلك استشارة مجانية</p>
</div>

<div class="bg-white rounded-[2rem] p-7 shadow-2xl">
<div class="flex justify-between items-center mb-6"><div id="pName" class="font-black"></div><div id="pPrice" class="text-sm text-zinc-500"></div></div>

<label class="text-sm font-bold">الاسم</label>
<input id="name" placeholder="اكتب اسمك" class="w-full mt-2 bg-[#f5f0e8] border rounded-xl px-4 py-3.5 text-sm">

<label class="text-sm font-bold mt-5 block">رقم الواتساب</label>
<div class="flex gap-2 mt-2">
<select class="bg-[#f5f0e8] border rounded-xl px-3 py-3.5 text-sm"><option>السعودية +966</option></select>
<input id="phone" placeholder="5XXXXXXXX" class="flex-1 bg-[#f5f0e8] border rounded-xl px-4 py-3.5 text-sm ltr text-left" dir="ltr">
</div>

<label class="text-sm font-bold mt-5 block">نوع نشاطك</label>
<div class="grid grid-cols-2 gap-2 mt-2">
<button type="button" onclick="setType(this,'محل / متجر')" class="type-btn bg-[#f5f0e8] border rounded-xl py-3 text-sm">محل / متجر</button>
<button type="button" onclick="setType(this,'عيادة / مركز طبي')" class="type-btn bg-[#f5f0e8] border rounded-xl py-3 text-sm">عيادة / مركز طبي</button>
<button type="button" onclick="setType(this,'مكتب عقاري')" class="type-btn bg-[#f5f0e8] border rounded-xl py-3 text-sm">مكتب عقاري</button>
<button type="button" onclick="setType(this,'مطعم / كافيه')" class="type-btn bg-[#f5f0e8] border rounded-xl py-3 text-sm">مطعم / كافيه</button>
<button type="button" onclick="setType(this,'خدمات أخرى')" class="type-btn bg-[#f5f0e8] border rounded-xl py-3 text-sm col-span-2">خدمات أخرى</button>
</div>

<label class="text-sm font-bold mt-5 block">أكثر تحدي بيواجهك في الرد على عملاءك؟ (اختياري)</label>
<textarea id="challenge" rows="3" placeholder="مثلاً: ما ألحق أرد على كل العملاء..." class="w-full mt-2 bg-[#f5f0e8] border rounded-xl px-4 py-3 text-sm"></textarea>

<button onclick="submitOrder()" class="w-full mt-6 bg-zinc-900 text-white rounded-full py-4 font-black text-sm">إرسال الطلب ✅</button>
<div id="msg" class="hidden mt-4 bg-[#f0fdf4] border border-green-200 rounded-xl p-4 text-center text-sm font-bold text-green-800">شكراً لكم سيتم التواصل معكم من قبل فريق العملاء على الواتساب 🙏</div>
</div>

<div class="text-center text-white/40 text- mt-6">WhatsBot AI © 2026</div>
</div>

<script>
const params=new URLSearchParams(location.search); const plan=params.get('plan')||'pro';
const plans={individual:{name:'أفراد / متاجر',price:'89 ر.س / شهر'},pro:{name:'احترافي',price:'189 ر.س / شهر'},enterprise:{name:'شركات / مؤسسات',price:'399 ر.س / شهر'}};
document.getElementById('pName').innerText=plans[plan].name; document.getElementById('pPrice').innerText=plans[plan].price;
let selectedType='';
function setType(el,v){ document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('bg-zinc-900','text-white')); el.classList.add('bg-zinc-900','text-white'); selectedType=v; }
async function submitOrder(){
 const data={name:document.getElementById('name').value, phone:document.getElementById('phone').value, type:selectedType, challenge:document.getElementById('challenge').value, plan};
 if(!data.name||!data.phone) return alert('عبّ الاسم ورقم الواتساب');
 await fetch('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
 document.getElementById('msg').classList.remove('hidden');
}
</script>
</body>
</html>
